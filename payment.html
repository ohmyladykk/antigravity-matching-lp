<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AG Labs - VIP Payment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="cyber-body" style="text-align:center; background:#050505; color:#00f2fe;">
    <div class="container" style="padding:100px 20px;">
        <h1 class="glitch" style="font-size:3rem;">VIP MEMBERSHIP</h1>
        <p style="letter-spacing:5px;">[ 決済方法を選択してください ]</p>
        
        <div class="pay-options" style="display:flex; justify-content:center; gap:30px; margin-top:50px; flex-wrap:wrap;">
            <div class="card" style="border:1px solid #00f2fe; padding:40px; border-radius:20px; width:250px; background:rgba(0,242,254,0.05);">
                <h3>₿ NEXO</h3>
                <p>Crypto Payment</p>
                <button onclick="window.open('https://nexo.com/', '_blank')" style="background:#1a42d9; color:white; border:none; padding:15px 30px; border-radius:10px; cursor:pointer; font-weight:bold; width:100%;">PAY NOW</button>
            </div>
            <div class="card" style="border:1px solid #635bff; padding:40px; border-radius:20px; width:250px; background:rgba(99,91,255,0.05);">
                <h3>💳 STRIPE</h3>
                <p>Credit Card</p>
                <button onclick="window.open('https://stripe.com/jp', '_blank')" style="background:#635bff; color:white; border:none; padding:15px 30px; border-radius:10px; cursor:pointer; font-weight:bold; width:100%;">PAY NOW</button>
            </div>
        </div>
        <br><br>
        <a href="index.html" style="color:#888; text-decoration:none;">← BACK TO MISSION CONTROL</a>
    </div>
</body>
</html>
